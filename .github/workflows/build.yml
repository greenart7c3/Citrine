name: Test/Build Android

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # The embedded FIPS node's native library is compiled from source on
      # every Gradle build (:app:buildFipsBridge, via preBuild), so the Rust
      # toolchain must be set up before any Gradle step.
      - name: Add Rust Android targets
        run: rustup target add aarch64-linux-android x86_64-linux-android

      - name: Cache cargo + FIPS build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            rust/fips-bridge/target
          key: ${{ runner.os }}-fips-${{ hashFiles('rust/fips-bridge/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fips-

      - name: Install cargo-ndk
        run: command -v cargo-ndk >/dev/null 2>&1 || cargo install cargo-ndk --locked

      - name: Linter (gradle)
        run: ./gradlew ktlintCheck

      - name: Test (gradle)
        run: ./gradlew test --no-daemon

      - name: Android Test Report
        uses: asadmansr/android-test-report-action@v1.2.0
        if: ${{ always() }} # IMPORTANT: run Android Test Report regardless

      - name: Build APK (gradle)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Debug APK
          path: app/build/outputs/apk/debug/app-universal-debug.apk

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: Build Reports
          path: app/build/reports

